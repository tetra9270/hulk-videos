name: Instagram Reels Daily Auto Upload

on:
  schedule:
    # Trigger 5 times a day (Mapped to Indian Standard Time IST - UTC+5:30):
    # - 04:30 UTC = 10:00 AM IST
    # - 06:30 UTC = 12:00 PM IST (noon)
    # - 09:30 UTC = 03:00 PM IST
    # - 12:30 UTC = 06:00 PM IST
    # - 16:30 UTC = 10:00 PM IST
    - cron: '30 4,6,9,12,16 * * *'
  workflow_dispatch:
    # Allows manual trigger of the pipeline from the GitHub UI

permissions:
  contents: write # Allows writing/pushing history.json back to the repository

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Captions File if Missing
        run: |
          if [ ! -f captions.txt ]; then
            echo -e "Default caption for Instagram Reel! 🎥🔥\n#viral #reels #automation" > captions.txt
          fi

      - name: Run Upload Automation Pipeline
        env:
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          HISTORY_FILE_PATH: "history.json"
          CAPTIONS_FILE_PATH: "captions.txt"
        run: |
          python main.py --single-run

      - name: Commit and push changes to history.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          git commit -m "Update upload history [skip ci]" || echo "No changes to commit"
          git push
